name: CI

# Consolidated CI gate for phenotype-teamcomm. Pulls the cargo /
# license / advisory / coverage / scorecard gates from the
# shared phenotype-actions reusable workflows.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly RustSec advisory refresh.
    - cron: "17 8 * * 1"
  workflow_dispatch:

# Cancel superseded PR runs; queue main-branch runs to keep
# release history deterministic.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to least-privilege; each job that needs more can
# override at the job level.
permissions:
  contents: read

jobs:
  rust-ci:
    name: Rust CI (cargo fmt / check / clippy / test)
    uses: kooshapari/phenotype-actions/.github/workflows/rust-ci.yml@v0.1.0
    with:
      toolchain: "1.75.0"
      cache-key-prefix: "teamcomm-rust"
      manifest-path: "."
      working-directory: "."

  cargo-deny:
    name: cargo-deny (license + advisory + bans + sources)
    uses: kooshapari/phenotype-actions/.github/workflows/cargo-deny.yml@v0.1.0
    with:
      toolchain: "1.75.0"
      cache-key-prefix: "teamcomm-deny"
      manifest-path: "."
      working-directory: "."

  cargo-audit:
    name: cargo-audit (RustSec)
    uses: kooshapari/phenotype-actions/.github/workflows/cargo-audit.yml@v0.1.0
    with:
      toolchain: "1.75.0"
      cache-key-prefix: "teamcomm-audit"
      manifest-path: "."
      working-directory: "."

  coverage:
    name: coverage (>= 70%)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    uses: kooshapari/phenotype-actions/.github/workflows/coverage.yml@v0.1.0
    with:
      toolchain: "1.75.0"
      cache-key-prefix: "teamcomm-coverage"
      manifest-path: "."
      working-directory: "."
      min-coverage: 70
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  scorecard:
    name: OSSF Scorecard
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'branch_protection_rule'
    uses: kooshapari/phenotype-actions/.github/workflows/scorecard.yml@v0.1.0
    with:
      results-format: "sarif"
      results-file: "scorecard-results.sarif"
